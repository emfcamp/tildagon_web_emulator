  <body>

      <div id="buttons">
        <button onclick="pressButton('A')">Button A</button>
        <button onclick="pressButton('B')">Button B</button>
        <button onclick="pressButton('C')">Button C</button>
        <button onclick="pressButton('D')">Button D</button>
        <button onclick="pressButton('E')">Button E</button>
        <button onclick="pressButton('F')">Button F</button>
      </div>

      <div id="screen">
        <!-- id="c" is targetted by the ctx WASM for output -->
        <canvas id="c" width="240" height="240"></canvas>
      </div>

    </section>

    <script>
      // Required by ctx
      window.windowToCanvas = function (canvas, x, y) {
        var rect = canvas.getBoundingClientRect();
        return {
          x: (x - rect.left) * (canvas.width  / rect.width),
          y: (y - rect.top)  * (canvas.height / rect.height),
        };
      };
    </script>

    <script type="module">
      import { loadMicroPython } from './micropython.mjs';

      // getBadgeButtonStates() is called by _sim.py every 0.1s
      const buttonStates = [0, 0, 0, 0, 0, 0];
      window.getBadgeButtonStates = () => buttonStates.join(',');

      function pressButton(id) {
        const idx = 'ABCDEF'.indexOf(id);
        if (idx === -1) return;
        buttonStates[idx] = 1;
        setTimeout(() => { buttonStates[idx] = 0; }, 150);
      }
      window.pressButton = pressButton;

      document.addEventListener('keydown', (e) => {
        switch (e.key) {
          case 'ArrowUp':    pressButton('A'); break;
          case 'ArrowRight': pressButton('B'); break;
          case 'Enter':      pressButton('C'); break;
          case 'ArrowDown':  pressButton('D'); break;
          case 'ArrowLeft':  pressButton('E'); break;
          case 'Escape':     pressButton('F'); break;
        }
      });


      window.updateLed = function (index, r, g, b) {
        const toLinear = v => v > 1 ? v / 255 : v;
        const toGamma  = v => Math.pow(Math.min(1, Math.max(0, v)), 1 / 2.2);
        const canvas = document.querySelector(`#led${index} canvas`);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.style.display = 'block';
        ctx.fillStyle = `color(srgb ${toGamma(toLinear(r))} ${toGamma(toLinear(g))} ${toGamma(toLinear(b))})`;
        ctx.beginPath();
        ctx.arc(10, 10, 10, 0, 2 * Math.PI);
        ctx.fill();
        ctx.closePath();
      };


      // Micropython SHOULD be able to await on javascript promises directly
      // since 1.27 but for the life of me I can't get it to work and ended up in
      // a twisty maze of micropython async bugs. Instead we patch requests
      // to trigger a fetch in javascript land, then it polls for the fetch to
      // complete. Ugly but it works.
      const _fetches = {};
      let _fetchSeq = 0;
      window.mp_fetch_start = function (url, method, body, contentType) {
        const id = ++_fetchSeq;
        const opts = { method: method || 'GET' };
        if (body != null) opts.body = body;
        if (contentType) opts.headers = { 'Content-Type': contentType };
        _fetches[id] = null;
        (async () => {
          try {
            const r = await fetch(url, opts);
            _fetches[id] = { status: r.status, body: new Uint8Array(await r.arrayBuffer()) };
          } catch (e) {
            _fetches[id] = { status: 0, body: new TextEncoder().encode(String(e)) };
          }
        })();
        return id;
      };
      window.mp_fetch_poll = function (id) {
        const result = _fetches[id];
        if (result === null) return null;
        delete _fetches[id];
        return result;
      };


      async function boot() {
        const loading = document.getElementById('loading');
        loading.showModal();

        const mp = await loadMicroPython({ heapsize: 2.5 * 1024 * 1024 });
        const FS = mp.FS;

        // Create directories for user-installed apps/backgrounds
        for (const d of ['/apps', '/backgrounds']) {
          try { FS.mkdir(d); } catch (_) {}
        }

        // Badge python firmware is frozen into the WASM binary so we override
        // things to make them compatible with the browser environment
        const files = [
          ['fakes/_sim.py',                                 '/_sim.py'],
          ['fakes/_thread.py',                              '/_thread.py'],
          ['fakes/async_helpers.py',                        '/async_helpers.py'],
          ['fakes/boot.py',                                 '/boot.py'],
          ['fakes/display.py',                              '/display.py'],
          ['fakes/leds.py',                                 '/leds.py'],
          ['fakes/tildagon_helpers.py',                     '/tildagon_helpers.py'],
          ['fakes/usocket.py',                              '/socket.py'],
          ['fakes/usocket.py',                              '/usocket.py'],
          ['fakes/egpio.py',                                '/egpio.py'], // This should be from badge-2024-software but the patch isn't merged yet so we've got our own special copy
          ['badge-2024-software/sim/fakes/esp32.py',        '/esp32.py'],
          ['badge-2024-software/sim/fakes/imu.py',          '/imu.py'],
          ['badge-2024-software/sim/fakes/machine.py',      '/machine.py'],
          ['badge-2024-software/sim/fakes/neopixel.py',     '/neopixel.py'],
          ['badge-2024-software/sim/fakes/network.py',      '/network.py'],
          ['badge-2024-software/sim/fakes/ota.py',          '/ota.py'],
          ['badge-2024-software/sim/fakes/pd.py',           '/pd.py'],
          ['badge-2024-software/sim/fakes/power.py',        '/power.py'],
          ['badge-2024-software/sim/fakes/power_event.py',  '/power_event.py'],
          ['badge-2024-software/sim/fakes/vfs.py',          '/vfs.py'],
        ];

        await Promise.all(files.map(async ([url, dest]) => {
          const r = await fetch(url);
          if (!r.ok) throw new Error(`fetch ${url} → ${r.status}`);
          FS.writeFile(dest, await r.text());
        }));

        loading.close();

        // boot.py applies patches before we start the full app
        await mp.runPythonAsync('import boot; import main');
      }

      boot().catch(err => {
        console.error('Boot failed:', err);
        document.getElementById('loading').innerHTML =
          `<h1>Load error</h1><pre>${err}</pre>`;
      });
    </script>
